# Phase 0 parity exceptions.
#
# Operations listed here are NOT yet implemented in CLI or WebUI.
# Each entry must declare which surface is missing and a target version.
# Remove the entry once the surface is implemented and tested.
#
# Fields:
#   operation_id  — operationId from api/openapi.yaml
#   missing       — "cli", "webui", or "both"
#   reason        — why the exception exists
#   target_version — first release that should close the gap

exceptions:
  # ── Auth ───────────────────────────────────────────────────────────────────
  # authSetup / authLogin / authRefresh / authLogout: server-side implemented in
  # PR B (argon2id + Ed25519 JWT + cookie-backed refresh sessions per
  # docs/spec/auth.md §2). CLI surface lands in PR F, WebUI in PR G.
  - operation_id: authSetup
    missing: both
    reason: "Server-side shipped in PR B; CLI in PR F, WebUI in PR G"
    target_version: "v0.1.0-alpha"

  - operation_id: authLogin
    missing: both
