        - Auth
      summary: Complete an MFA challenge with a TOTP code
      description: Exchanges an mfa_token plus a valid TOTP code for a full JWT access token.
      operationId: authMfaComplete
      requestBody:
        description: MFA completion payload.
        content:
          application/json:
            schema:
              description: MFA completion payload.
              $ref: '#/components/schemas/AuthMfaCompleteRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthMfaCompleteRequest.json
              mfa_token: example
              totp_code: example
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMfaCompleteEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthMfaCompleteEnvelope.json
                data: {}
                meta: {}
        "401":
