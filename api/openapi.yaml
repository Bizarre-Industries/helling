                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/tokens/{id}:
    delete:
      tags:
        - Auth
      summary: Revoke an API token
      description: Invalidates the given token. Revoking an already-unknown token returns 404.
      operationId: authTokenRevoke
      parameters:
        - name: id
          in: path
          description: Token identifier to revoke.
          required: true
          schema:
            type: string
            description: Token identifier to revoke.
            minLength: 1
            maxLength: 64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
