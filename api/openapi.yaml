openapi: 3.1.0
info:
  title: Helling API
  description: Generated contract for Helling-owned endpoints under /api/v1.
  version: 0.1.0
servers:
  - url: https://localhost:8006
    description: Local Helling API endpoint.
paths:
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: PAM authenticate and issue JWT pair
      description: Authenticates a PAM user and returns tokens or an MFA challenge.
      operationId: authLogin
      requestBody:
        description: PAM credentials with optional inline TOTP code.
        content:
          application/json:
            schema:
              description: PAM credentials with optional inline TOTP code.
              $ref: '#/components/schemas/AuthLoginRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthLoginRequest.json
              password: example
              totp_code: example
              username: example
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthLoginEnvelope.json
                data: {}
                meta: {}
        "202":
          description: MFA challenge required before token issuance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthLoginEnvelope.json
                data: {}
                meta: {}
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "422":
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "429":
          description: Too Many Requests
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke the current session
      description: Invalidates the caller's refresh token server-side. Stub implementation returns empty success envelope until the token store lands. Bearer-auth requirement will be declared once the bearerAuth scheme ships with the JWT middleware.
      operationId: authLogout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutEnvelope'
              example:
                data: {}
                meta:
                  request_id: req_auth_logout
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/mfa/complete:
    post:
      tags:
        - Auth
      summary: Complete an MFA challenge with a TOTP code
      description: Exchanges an mfa_token plus a valid TOTP code for a full JWT access token.
      operationId: authMfaComplete
      requestBody:
        description: MFA completion payload.
        content:
          application/json:
            schema:
              description: MFA completion payload.
              $ref: '#/components/schemas/AuthMfaCompleteRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthMfaCompleteRequest.json
              mfa_token: example
              totp_code: example
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMfaCompleteEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthMfaCompleteEnvelope.json
                data: {}
                meta: {}
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "422":
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Exchange a refresh token for a new access token
      description: Issues a new short-lived access token when the supplied refresh token is valid and within the inactivity window.
      operationId: authRefresh
      requestBody:
        description: Refresh token exchange payload.
        content:
          application/json:
            schema:
              description: Refresh token exchange payload.
              $ref: '#/components/schemas/AuthRefreshRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthRefreshRequest.json
              refresh_token: example
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshEnvelope'
              example:
                data:
                  access_token: eyJhbGciOiJFZERTQSJ9.refresh.stub
                  expires_in: 900
                  token_type: Bearer
                meta:
                  request_id: req_auth_refresh
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "422":
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/setup:
    post:
      tags:
        - Auth
      summary: Create the initial admin account
      description: Bootstraps the first administrator on a fresh install. Idempotently refuses if any admin already exists; stub accepts any payload.
      operationId: authSetup
      requestBody:
        description: Initial admin credentials.
        content:
          application/json:
            schema:
              description: Initial admin account credentials.
              $ref: '#/components/schemas/AuthSetupRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthSetupRequest.json
              password: example
              username: example
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSetupEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthSetupEnvelope.json
                data: {}
                meta: {}
        "409":
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "422":
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/tokens:
    get:
      tags:
        - Auth
      summary: List API tokens
      description: Lists API tokens belonging to the current user using cursor pagination.
      operationId: authTokenList
      parameters:
        - name: limit
          in: query
          description: Maximum number of tokens to return.
          explode: false
          schema:
            type: integer
            description: Maximum number of tokens to return.
            format: int64
            default: 50
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          description: Opaque pagination cursor from previous response.
          explode: false
          schema:
            type: string
            description: Opaque pagination cursor from previous response.
            maxLength: 512
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenListEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthTokenListEnvelope.json
                data:
                  - {}
                meta: {}
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
    post:
      tags:
        - Auth
      summary: Create a new API token
      description: Creates and returns a new API token. Plaintext token is surfaced exactly once.
      operationId: authTokenCreate
      requestBody:
        description: Token creation payload.
        content:
          application/json:
            schema:
              description: Token creation payload.
              $ref: '#/components/schemas/AuthTokenCreateRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthTokenCreateRequest.json
              name: example
              scope: admin
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenCreateEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthTokenCreateEnvelope.json
                data: {}
                meta: {}
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/tokens/{id}:
    delete:
      tags:
        - Auth
      summary: Revoke an API token
      description: Invalidates the given token. Revoking an already-unknown token returns 404.
      operationId: authTokenRevoke
      parameters:
        - name: id
          in: path
          description: Token identifier to revoke.
          required: true
          schema:
            type: string
            description: Token identifier to revoke.
            minLength: 1
            maxLength: 64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenRevokeEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthTokenRevokeEnvelope.json
                data: {}
                meta: {}
        "404":
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "422":
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/totp/disable:
    post:
      tags:
        - Auth
      summary: Disable TOTP for the current user
      description: Removes the active TOTP factor. Admin-initiated removals are out of scope in v0.1.
      operationId: authTotpDisable
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTotpDisableEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthTotpDisableEnvelope.json
                data: {}
                meta: {}
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/totp/setup:
    post:
      tags:
        - Auth
      summary: Begin TOTP enrollment for the current user
      description: Issues a new TOTP secret, provisioning URI, and a set of single-use recovery codes. The factor must be confirmed with /auth/totp/verify before it is active.
      operationId: authTotpSetup
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTotpSetupEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthTotpSetupEnvelope.json
                data: {}
                meta: {}
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/totp/verify:
    post:
      tags:
        - Auth
      summary: Confirm a pending TOTP enrollment
      description: Activates the pending TOTP factor when the supplied code is valid.
      operationId: authTotpVerify
      requestBody:
        description: TOTP verification payload.
        content:
          application/json:
            schema:
              description: TOTP verification payload.
              $ref: '#/components/schemas/AuthTotpVerifyRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthTotpVerifyRequest.json
              totp_code: example
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTotpVerifyEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthTotpVerifyEnvelope.json
                data: {}
                meta: {}
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "422":
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/health:
    get:
      tags:
        - System
      summary: Health check
      description: Returns service health for unauthenticated readiness checks.
      operationId: healthGet
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
              example:
                data:
                  status: ok
                meta:
                  request_id: req_huma_spike
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/users:
    get:
      tags:
        - Users
      summary: List users
      description: Lists users using cursor pagination metadata in the response envelope.
      operationId: userList
      parameters:
        - name: limit
          in: query
          description: Maximum number of users to return.
          explode: false
          schema:
            type: integer
            description: Maximum number of users to return.
            format: int64
            default: 50
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          description: Opaque pagination cursor from previous response.
          explode: false
          schema:
            type: string
            description: Opaque pagination cursor from previous response.
            maxLength: 512
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListEnvelope'
              example:
                $schema: https://localhost:8006/schemas/UserListEnvelope.json
                data:
                  - {}
                meta: {}
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
components:
  schemas:
    AuthLoginData:
      type: object
      description: Schema for authlogindata.
      examples:
        - access_token: example
          expires_in: 1
          mfa_required: true
          mfa_token: example
          token_type: Bearer
      additionalProperties: false
      properties:
        access_token:
          type: string
          description: JWT access token when login succeeds without MFA challenge.
          examples:
            - example
        expires_in:
          type: integer
          description: Access token TTL in seconds.
          format: int64
          examples:
            - 1
          minimum: 1
        mfa_required:
          type: boolean
          description: Indicates whether MFA completion is required before token issuance.
          examples:
            - true
        mfa_token:
          type: string
          description: Opaque token used to complete MFA challenge.
          examples:
            - example
        token_type:
          type: string
          description: Token scheme for access token responses.
          examples:
            - Bearer
          enum:
            - Bearer
    AuthLoginEnvelope:
      type: object
      description: Schema for authloginenvelope.
      examples:
        - $schema: https://localhost:8006/schemas/AuthLoginEnvelope.json
          data: {}
          meta: {}
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/AuthLoginEnvelope.json
          readOnly: true
        data:
          description: Property data.
          $ref: '#/components/schemas/AuthLoginData'
          examples:
            - access_token: example
              expires_in: 1
              mfa_required: true
              mfa_token: example
              token_type: Bearer
        meta:
          description: Property meta.
          $ref: '#/components/schemas/AuthLoginMeta'
          examples:
            - request_id: id_example
      required:
        - data
        - meta
    AuthLoginMeta:
      type: object
      description: Schema for authloginmeta.
      examples:
        - request_id: id_example
      additionalProperties: false
      properties:
        request_id:
          type: string
          description: Request correlation ID.
          examples:
            - id_example
      required:
        - request_id
    AuthLoginRequest:
      type: object
      description: Schema for authloginrequest.
      examples:
        - $schema: https://localhost:8006/schemas/AuthLoginRequest.json
          password: example
          totp_code: example
          username: example
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/AuthLoginRequest.json
          readOnly: true
        password:
          type: string
          description: Password for PAM authentication.
          examples:
            - example
          minLength: 1
          maxLength: 256
        totp_code:
          type: string
          description: Optional TOTP code for MFA completion.
          examples:
            - example
          minLength: 6
          maxLength: 8
        username:
          type: string
          description: Username for PAM authentication.
          examples:
            - example
          minLength: 1
          maxLength: 64
      required:
        - username
        - password
    AuthLogoutData:
      type: object
      description: Schema for authlogoutdata.
      examples:
        - {}
      additionalProperties: false
    AuthLogoutEnvelope:
      type: object
      description: Success envelope for auth logout responses.
      examples:
        - data: {}
          meta:
            request_id: req_auth_logout
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/AuthLogoutEnvelope.json
          readOnly: true
        data:
          description: Property data.
          $ref: '#/components/schemas/AuthLogoutData'
          examples:
            - {}
        meta:
          description: Property meta.
          $ref: '#/components/schemas/AuthLogoutMeta'
          examples:
            - {}
      required:
        - data
        - meta
    AuthLogoutMeta:
      type: object
      description: Schema for authlogoutmeta.
      examples:
        - request_id: id_example
      additionalProperties: false
      properties:
        request_id:
          type: string
          description: Request correlation ID.
          examples:
            - id_example
      required:
        - request_id
    AuthMfaCompleteData:
      type: object
      description: Schema for authmfacompletedata.
      examples:
        - access_token: example
          expires_in: 1
          token_type: Bearer
      additionalProperties: false
      properties:
        access_token:
          type: string
          description: JWT access token.
          examples:
            - example
        expires_in:
          type: integer
          description: Access token TTL in seconds.
          format: int64
          examples:
            - 1
          minimum: 1
        token_type:
          type: string
          description: Token scheme.
          examples:
            - Bearer
          enum:
            - Bearer
      required:
        - access_token
        - token_type
        - expires_in
    AuthMfaCompleteEnvelope:
      type: object
      description: Schema for authmfacompleteenvelope.
      examples:
        - $schema: https://localhost:8006/schemas/AuthMfaCompleteEnvelope.json
          data: {}
          meta: {}
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/AuthMfaCompleteEnvelope.json
          readOnly: true
        data:
          description: Property data.
          $ref: '#/components/schemas/AuthMfaCompleteData'
          examples:
            - {}
        meta:
          description: Property meta.
          $ref: '#/components/schemas/AuthMfaCompleteMeta'
          examples:
            - {}
      required:
        - data
        - meta
    AuthMfaCompleteMeta:
      type: object
      description: Schema for authmfacompletemeta.
      examples:
        - request_id: id_example
      additionalProperties: false
      properties:
        request_id:
          type: string
          description: Request correlation ID.
          examples:
            - id_example
      required:
        - request_id
    AuthMfaCompleteRequest:
      type: object
      description: Schema for authmfacompleterequest.
      examples:
        - $schema: https://localhost:8006/schemas/AuthMfaCompleteRequest.json
          mfa_token: example
          totp_code: example
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/AuthMfaCompleteRequest.json
          readOnly: true
        mfa_token:
          type: string
          description: MFA token returned by the login endpoint.
          examples:
            - example
          minLength: 1
