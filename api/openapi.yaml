components:
  schemas:
    AuditEvent:
      type: object
      description: Schema for auditevent.
      examples:
        - action: example
          actor: example
          id: id_example
          outcome: allow
          target: example
          timestamp: example
      additionalProperties: false
      properties:
        action:
          type: string
          description: Action identifier (dot-separated).
          examples:
            - example
        actor:
          type: string
          description: Actor who performed the action.
          examples:
            - example
        id:
          type: string
          description: Event identifier.
          examples:
            - id_example
        outcome:
          type: string
          description: Action outcome.
          examples:
            - allow
          enum:
            - allow
            - deny
            - error
        target:
          type: string
          description: Target resource identifier, if applicable.
          examples:
            - example
        timestamp:
          type: string
          description: Event timestamp (ISO-8601).
          format: date-time
          examples:
            - example
      required:
        - id
        - timestamp
        - actor
        - action
        - outcome
    AuditExportData:
      type: object
      description: Schema for auditexportdata.
      examples:
        - body: example
          format: json
      additionalProperties: false
      properties:
        body:
          type: string
          description: Export payload inlined as a string.
          examples:
            - example
        format:
          type: string
          description: Export format.
          examples:
            - json
          enum:
            - json
            - csv
      required:
        - format
        - body
    AuditExportEnvelope:
      type: object
      description: Schema for auditexportenvelope.
      examples:
        - $schema: https://localhost:8006/schemas/AuditExportEnvelope.json
          data: {}
          meta: {}
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/AuditExportEnvelope.json
          readOnly: true
        data:
          description: Property data.
          $ref: '#/components/schemas/AuditExportData'
          examples:
            - body: example
              format: json
        meta:
          description: Property meta.
          $ref: '#/components/schemas/AuditMeta'
          examples:
            - request_id: id_example
      required:
        - data
        - meta
    AuditMeta:
      type: object
      description: Schema for auditmeta.
      examples:
        - request_id: id_example
      additionalProperties: false
      properties:
        request_id:
          type: string
          description: Request correlation ID.
          examples:
            - id_example
      required:
        - request_id
    AuditPageMeta:
      type: object
      description: Schema for auditpagemeta.
      examples:
        - has_next: true
          limit: 1
          next_cursor: example
      additionalProperties: false
      properties:
        has_next:
          type: boolean
          description: Whether another page is available.
          examples:
            - true
        limit:
          type: integer
          description: Applied page size.
          format: int64
          examples:
            - 1
          minimum: 1
        next_cursor:
          type: string
          description: Opaque cursor for the next page when available.
          examples:
            - example
      required:
        - has_next
        - limit
