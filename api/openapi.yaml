              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
    post:
      tags:
        - Auth
      summary: Create a new API token
      description: Creates and returns a new API token. Plaintext token is surfaced exactly once.
      operationId: authTokenCreate
      requestBody:
        description: Token creation payload.
        content:
          application/json:
            schema:
              description: Token creation payload.
              $ref: '#/components/schemas/AuthTokenCreateRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthTokenCreateRequest.json
              name: example
              scope: admin
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenCreateEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthTokenCreateEnvelope.json
                data: {}
                meta: {}
        default:
