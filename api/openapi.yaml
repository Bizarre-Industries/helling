openapi: 3.1.0
info:
  title: Helling API
  description: Generated contract for Helling-owned endpoints under /api/v1.
  version: 0.1.0
servers:
  - url: https://localhost:8006
    description: Local Helling API endpoint.
paths:
  /api/v1/audit:
    get:
      tags:
        - Audit
      summary: Query audit events
      description: Returns audit events, optionally filtered by actor and action, with cursor pagination. Source of truth is the systemd journal (ADR-019).
      operationId: auditQuery
      parameters:
        - name: actor
          in: query
          description: Filter by actor username.
          explode: false
          schema:
            type: string
            description: Filter by actor username.
            maxLength: 128
        - name: action
          in: query
          description: Filter by action identifier.
          explode: false
          schema:
            type: string
            description: Filter by action identifier.
            maxLength: 128
        - name: limit
          in: query
          description: Maximum number of events to return.
          explode: false
          schema:
            type: integer
            description: Maximum number of events to return.
            format: int64
            default: 100
            minimum: 1
            maximum: 1000
        - name: cursor
          in: query
          description: Opaque pagination cursor from previous response.
          explode: false
          schema:
            type: string
            description: Opaque pagination cursor from previous response.
            maxLength: 512
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditQueryEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuditQueryEnvelope.json
                data:
                  - {}
                meta: {}
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/audit/export:
    get:
      tags:
        - Audit
      summary: Bulk export audit events
      description: Returns the filtered audit event stream inlined as either JSON or CSV.
      operationId: auditExport
      parameters:
        - name: format
          in: query
          description: Export format.
          explode: false
          schema:
            type: string
            description: Export format.
            default: json
            enum:
              - json
              - csv
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuditExportEnvelope.json
                data: {}
                meta: {}
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: PAM authenticate and issue JWT pair
      description: Authenticates a PAM user and returns tokens or an MFA challenge.
      operationId: authLogin
      requestBody:
        description: PAM credentials with optional inline TOTP code.
        content:
          application/json:
            schema:
              description: PAM credentials with optional inline TOTP code.
              $ref: '#/components/schemas/AuthLoginRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthLoginRequest.json
              password: example
              totp_code: example
              username: example
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthLoginEnvelope.json
                data: {}
                meta: {}
        "202":
          description: MFA challenge required before token issuance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthLoginEnvelope.json
                data: {}
                meta: {}
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "422":
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "429":
          description: Too Many Requests
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke the current session
      description: Invalidates the caller's refresh token server-side. Stub implementation returns empty success envelope until the token store lands. Bearer-auth requirement will be declared once the bearerAuth scheme ships with the JWT middleware.
      operationId: authLogout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutEnvelope'
              example:
                data: {}
                meta:
                  request_id: req_auth_logout
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
