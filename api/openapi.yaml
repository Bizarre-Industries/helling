openapi: 3.1.0
info:
  title: Helling API
  description: Generated contract for Helling-owned endpoints under /api/v1.
  version: 0.1.0
servers:
  - url: https://localhost:8006
    description: Local Helling API endpoint.
paths:
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: PAM authenticate and issue JWT pair
      description: Authenticates a PAM user and returns tokens or an MFA challenge.
      operationId: authLogin
      requestBody:
        description: PAM credentials with optional inline TOTP code.
        content:
          application/json:
            schema:
              description: PAM credentials with optional inline TOTP code.
              $ref: '#/components/schemas/AuthLoginRequest'
            example:
              $schema: https://localhost:8006/schemas/AuthLoginRequest.json
              password: example
              totp_code: example
              username: example
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthLoginEnvelope.json
                data: {}
                meta: {}
        "202":
          description: MFA challenge required before token issuance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginEnvelope'
              example:
                $schema: https://localhost:8006/schemas/AuthLoginEnvelope.json
                data: {}
                meta: {}
        "401":
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "422":
          description: Unprocessable Entity
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "429":
          description: Too Many Requests
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
        "500":
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/health:
    get:
      tags:
        - System
      summary: Health check
      description: Returns service health for unauthenticated readiness checks.
      operationId: healthGet
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthEnvelope'
              example:
                data:
                  status: ok
                meta:
                  request_id: req_huma_spike
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
  /api/v1/users:
    get:
      tags:
        - Users
      summary: List users
      description: Lists users using cursor pagination metadata in the response envelope.
      operationId: userList
      parameters:
        - name: limit
          in: query
          description: Maximum number of users to return.
          explode: false
          schema:
            type: integer
            description: Maximum number of users to return.
            format: int64
            default: 50
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          description: Opaque pagination cursor from previous response.
          explode: false
          schema:
            type: string
            description: Opaque pagination cursor from previous response.
            maxLength: 512
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListEnvelope'
              example:
                $schema: https://localhost:8006/schemas/UserListEnvelope.json
                data:
                  - {}
                meta: {}
        default:
          description: Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
              example:
                detail: validation failed
                errors:
                  - location: body.username
                    message: must not be empty
                    value: ""
                status: 400
                title: Bad Request
components:
  schemas:
    AuthLoginData:
      type: object
      description: Schema for authlogindata.
      examples:
        - access_token: example
          expires_in: 1
          mfa_required: true
          mfa_token: example
          token_type: Bearer
      additionalProperties: false
      properties:
        access_token:
          type: string
          description: JWT access token when login succeeds without MFA challenge.
          examples:
            - example
        expires_in:
          type: integer
          description: Access token TTL in seconds.
          format: int64
          examples:
            - 1
          minimum: 1
        mfa_required:
          type: boolean
          description: Indicates whether MFA completion is required before token issuance.
          examples:
            - true
        mfa_token:
          type: string
          description: Opaque token used to complete MFA challenge.
          examples:
            - example
        token_type:
          type: string
          description: Token scheme for access token responses.
          examples:
            - Bearer
          enum:
            - Bearer
    AuthLoginEnvelope:
      type: object
      description: Schema for authloginenvelope.
      examples:
        - $schema: https://localhost:8006/schemas/AuthLoginEnvelope.json
          data: {}
          meta: {}
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/AuthLoginEnvelope.json
          readOnly: true
        data:
          description: Property data.
          $ref: '#/components/schemas/AuthLoginData'
          examples:
            - access_token: example
              expires_in: 1
              mfa_required: true
              mfa_token: example
              token_type: Bearer
        meta:
          description: Property meta.
          $ref: '#/components/schemas/AuthLoginMeta'
          examples:
            - {}
      required:
        - data
        - meta
    AuthLoginMeta:
      type: object
      description: Schema for authloginmeta.
      examples:
        - request_id: id_example
      additionalProperties: false
      properties:
        request_id:
          type: string
          description: Request correlation ID.
          examples:
            - id_example
      required:
        - request_id
    AuthLoginRequest:
      type: object
      description: Schema for authloginrequest.
      examples:
        - $schema: https://localhost:8006/schemas/AuthLoginRequest.json
          password: example
          totp_code: example
          username: example
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/AuthLoginRequest.json
          readOnly: true
        password:
          type: string
          description: Password for PAM authentication.
          examples:
            - example
          minLength: 1
          maxLength: 256
        totp_code:
          type: string
          description: Optional TOTP code for MFA completion.
          examples:
            - example
          minLength: 6
          maxLength: 8
        username:
          type: string
          description: Username for PAM authentication.
          examples:
            - example
          minLength: 1
          maxLength: 64
      required:
        - username
        - password
    ErrorDetail:
      type: object
      description: Detailed validation issue information.
      examples:
        - location: body.username
          message: must not be empty
          value: ""
      additionalProperties: false
      properties:
        location:
          type: string
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          examples:
            - body.username
        message:
          type: string
          description: Error message text
          examples:
            - must not be empty
        value:
          type: string
          description: The value at the given location
          examples:
            - ""
    ErrorModel:
      type: object
      description: Problem-details error response model.
      examples:
        - detail: validation failed
          errors:
            - location: body.username
              message: must not be empty
              value: ""
          status: 400
          title: Bad Request
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/ErrorModel.json
          readOnly: true
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
        errors:
          type: array
          description: Optional list of individual error details
          examples:
            - - location: body.username
                message: must not be empty
                value: ""
          items:
            $ref: '#/components/schemas/ErrorDetail'
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence of the problem.
          format: uri
          examples:
            - https://example.com/error-log/abc123
        status:
          type: integer
          description: HTTP status code
          format: int64
          examples:
            - 400
        title:
          type: string
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
        type:
          type: string
          description: A URI reference to human-readable documentation for the error.
          format: uri
          default: about:blank
          examples:
            - https://example.com/errors/example
    HealthData:
      type: object
      description: Health endpoint payload.
      examples:
        - status: ok
      additionalProperties: false
      properties:
        status:
          type: string
          description: Service health state.
          examples:
            - ok
          enum:
            - ok
      required:
        - status
    HealthEnvelope:
      type: object
      description: Success envelope for health responses.
      examples:
        - data:
            status: ok
          meta:
            request_id: req_huma_spike
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/HealthEnvelope.json
          readOnly: true
        data:
          description: Health payload.
          $ref: '#/components/schemas/HealthData'
          examples:
            - status: ok
        meta:
          description: Request metadata envelope.
          $ref: '#/components/schemas/HealthMeta'
          examples:
            - request_id: req_huma_spike
      required:
        - data
        - meta
    HealthMeta:
      type: object
      description: Metadata included in health responses.
      examples:
        - request_id: req_huma_spike
      additionalProperties: false
      properties:
        request_id:
          type: string
          description: Request correlation ID.
          examples:
            - id_example
      required:
        - request_id
    UserListEnvelope:
      type: object
      description: Schema for userlistenvelope.
      examples:
        - $schema: https://localhost:8006/schemas/UserListEnvelope.json
          data:
            - {}
          meta: {}
      additionalProperties: false
      properties:
        $schema:
          type: string
          description: A URL to the JSON Schema for this object.
          format: uri
          examples:
            - https://localhost:8006/schemas/UserListEnvelope.json
          readOnly: true
        data:
          type: array
          description: Property data.
          examples:
            - - {}
          items:
            $ref: '#/components/schemas/UserRecord'
        meta:
          description: Property meta.
          $ref: '#/components/schemas/UserListMeta'
          examples:
            - {}
      required:
        - data
        - meta
    UserListMeta:
      type: object
      description: Schema for userlistmeta.
      examples:
        - page: {}
          request_id: id_example
      additionalProperties: false
      properties:
        page:
          description: Cursor pagination metadata.
          $ref: '#/components/schemas/UserPageMeta'
          examples:
            - {}
        request_id:
          type: string
          description: Request correlation ID.
          examples:
            - id_example
      required:
        - request_id
        - page
    UserPageMeta:
      type: object
      description: Schema for userpagemeta.
      examples:
        - has_next: true
          limit: 1
          next_cursor: example
      additionalProperties: false
      properties:
        has_next:
          type: boolean
          description: Whether another page is available.
          examples:
            - true
        limit:
          type: integer
          description: Applied page size.
          format: int64
          examples:
            - 1
          minimum: 1
        next_cursor:
          type: string
          description: Opaque cursor for the next page when available.
          examples:
            - example
      required:
        - has_next
        - limit
    UserRecord:
      type: object
      description: Schema for userrecord.
      examples:
        - id: id_example
          role: admin
          status: active
          username: example
      additionalProperties: false
      properties:
        id:
          type: string
          description: User identifier.
          examples:
            - id_example
        role:
          type: string
          description: Assigned role.
          examples:
            - admin
          enum:
            - admin
            - user
            - auditor
        status:
          type: string
          description: Account status.
          examples:
            - active
          enum:
            - active
            - disabled
        username:
          type: string
          description: Username.
          examples:
            - example
      required:
        - id
        - username
        - role
        - status
tags:
  - name: Auth
    description: Authentication and token lifecycle endpoints.
  - name: Users
    description: User account and access management endpoints.
  - name: System
    description: System and service health endpoints.
