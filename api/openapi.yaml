# PRE-HUMA SNAPSHOT — to be replaced by generated output post-ADR-043
openapi: 3.1.0
info:
  title: Helling API
  version: 0.1.0
  summary: Helling-owned control-plane API for authentication, users, schedules, webhooks, Kubernetes, system, firewall, audit, and events.
  description: |
    Normative contract for Helling-owned endpoints under /api/v1.

    Notes:
    - /api/incus/* and /api/podman/* are transparent proxy surfaces and are not modeled here.
    - Success and error envelopes are defined in components/schemas and used consistently.
servers:
  - url: https://{host}:8006
    variables:
      host:
        default: localhost
tags:
  - name: Auth
  - name: Users
  - name: Schedules
  - name: Webhooks
  - name: Kubernetes
  - name: System
  - name: Firewall
  - name: Audit
  - name: Events
paths:
  /api/v1/auth/setup:
    post:
      tags: [ Auth ]
      operationId: authSetup
      summary: First admin creation (one-time)
      description: Creates the initial administrator account when no users exist in the system.
      security: []
      requestBody:
        required: true
        description: First administrator credentials used to bootstrap the installation.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSetupRequest'
            example:
              username: admin
              password: correct-horse-battery-staple
      responses:
        '201':
          description: Setup completed and first administrator created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuthSetupResponse'
              example:
                data:
                  setup_complete: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
        '429':
          $ref: '#/components/responses/RateLimitError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/auth/login:
    post:
      tags: [ Auth ]
      operationId: authLogin
      summary: PAM authenticate and issue JWT pair
      description: Authenticates a PAM user and returns either tokens or an MFA challenge.
      security: []
      requestBody:
        required: true
        description: PAM credentials with optional inline TOTP code.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
            examples:
              basic:
                summary: Password-only login
                value:
                  username: alice
                  password: correct-horse-battery-staple
              with_totp:
                summary: Password plus TOTP code
                value:
                  username: alice
                  password: correct-horse-battery-staple
                  totp_code: "492018"
      responses:
        '200':
          description: Login successful and access token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuthLoginResponse'
              example:
                data:
                  access_token: eyJhbGciOiJFZERTQSJ9...
                  token_type: Bearer
                  expires_in: 900
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
        '202':
          description: MFA challenge required before tokens are issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeMfaChallengeResponse'
              example:
                data:
                  mfa_required: true
                  mfa_token: mfa_01JZABC0123456789ABCDEFGJK
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
        '401':
          $ref: '#/components/responses/AuthError'
        '429':
          $ref: '#/components/responses/RateLimitError'
  /api/v1/auth/refresh:
    post:
      tags: [ Auth ]
      operationId: authRefresh
      summary: Refresh access token
      description: Exchanges a valid refresh session for a new short-lived access token.
      responses:
        '200':
          description: Access token refreshed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuthRefreshResponse'
              example:
                data:
                  access_token: eyJhbGciOiJFZERTQSJ9...
                  token_type: Bearer
                  expires_in: 900
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
        '401':
          $ref: '#/components/responses/AuthError'
        '429':
          $ref: '#/components/responses/RateLimitError'
  /api/v1/auth/logout:
    post:
      tags: [ Auth ]
      operationId: authLogout
      summary: Revoke current session
      description: Revokes the current refresh session and invalidates subsequent refresh attempts.
      responses:
        '200':
          description: Session revoked successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
              example:
                data:
                  ok: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
  /api/v1/auth/mfa/complete:
    post:
      tags: [ Auth ]
      operationId: authMfaComplete
      summary: Complete MFA challenge
      description: Completes a pending MFA challenge using a valid challenge token and TOTP code.
      requestBody:
        required: true
        description: MFA token and TOTP code for challenge completion.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaCompleteRequest'
            example:
              mfa_token: mfa_01JZABC0123456789ABCDEFGJK
              totp_code: "492018"
      responses:
        '200':
          description: MFA challenge completed and access token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAuthLoginResponse'
              example:
                data:
                  access_token: eyJhbGciOiJFZERTQSJ9...
                  token_type: Bearer
                  expires_in: 900
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
        '401':
          $ref: '#/components/responses/AuthError'
        '429':
          $ref: '#/components/responses/RateLimitError'
  /api/v1/auth/totp/setup:
    post:
      tags: [ Auth ]
      operationId: authTotpSetup
      summary: Start TOTP enrollment
      description: Creates enrollment material for TOTP setup for the authenticated user.
      responses:
        '200':
          description: Enrollment material returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeTotpSetupResponse'
              example:
                data:
                  otpauth_uri: otpauth://totp/Helling:alice?secret=ABC123&issuer=Helling
                  qr_png_base64: iVBORw0KGgoAAAANSUhEUgAA...
                  recovery_codes: [ rc1a-1234, rc1b-5678 ]
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
  /api/v1/auth/totp/verify:
    post:
      tags: [ Auth ]
      operationId: authTotpVerify
      summary: Verify TOTP enrollment
      description: Verifies the enrollment code and enables TOTP for the current user.
      requestBody:
        required: true
        description: TOTP code generated from the enrollment secret.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpVerifyRequest'
            example:
              code: "492018"
      responses:
        '200':
          description: TOTP enabled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
              example:
                data:
                  ok: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
        '401':
          $ref: '#/components/responses/AuthError'
  /api/v1/auth/totp:
    delete:
      tags: [ Auth ]
      operationId: authTotpDisable
      summary: Disable TOTP
      description: Disables TOTP for the current authenticated user.
      responses:
        '200':
          description: TOTP disabled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
              example:
                data:
                  ok: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
  /api/v1/auth/tokens:
    get:
      tags: [ Auth ]
      operationId: authTokenList
      summary: List API tokens for current user
      description: Returns API tokens owned by the current authenticated user.
      responses:
        '200':
          description: API token list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeTokenList'
              example:
                data:
                  - id: 01JZABC0123456789ABCDEFGJK
                    name: ci-bot
                    scope: write
                    expires_at: "2026-06-01T00:00:00Z"
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
    post:
      tags: [ Auth ]
      operationId: authTokenCreate
      summary: Create API token
      description: Creates an API token for the current user with the requested scope.
      requestBody:
        required: true
        description: API token creation payload including name and scope.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTokenRequest'
            example:
              name: ci-bot
              scope: write
      responses:
        '201':
          description: API token created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCreateTokenResponse'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  token: tok_01JZABC0123456789ABCDEFGJK
                  scope: write
                  expires_at: "2026-06-01T00:00:00Z"
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
  /api/v1/auth/tokens/{id}:
    delete:
      tags: [ Auth ]
      operationId: authTokenRevoke
      summary: Revoke API token
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/v1/users:
    get:
      tags: [ Users ]
      operationId: userList
      summary: List users
      description: Returns paginated users managed by Helling.
      parameters:
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageCursor'
      responses:
        '200':
          description: User list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUserList'
              example:
                data:
                  - id: 01JZABC0123456789ABCDEFGJK
                    username: alice
                    role: admin
                    status: active
                    created_at: "2026-04-20T10:00:00Z"
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
                  page:
                    has_next: false
                    next_cursor: null
                    limit: 50
    post:
      tags: [ Users ]
      operationId: userCreate
      summary: Create user and provision trust identity
      description: Creates a user account and provisions delegated access identity.
      requestBody:
        required: true
        description: User creation payload with username and role.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              username: bob
              role: user
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  username: bob
                  role: user
                  status: active
                  created_at: "2026-04-20T10:00:00Z"
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
        '409':
          $ref: '#/components/responses/ConflictError'
  /api/v1/users/{id}:
    get:
      tags: [ Users ]
      operationId: userGet
      summary: Get user detail
      description: Returns details for a specific user by ULID identifier.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: User details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  username: alice
                  role: admin
                  status: active
                  created_at: "2026-04-20T10:00:00Z"
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [ Users ]
      operationId: userUpdate
      summary: Update user role/status
      description: Updates mutable role and status fields for a user.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        description: Partial user update payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            example:
              role: auditor
              status: active
      responses:
        '200':
          description: User updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeUser'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  username: alice
                  role: auditor
                  status: active
                  created_at: "2026-04-20T10:00:00Z"
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [ Users ]
      operationId: userDelete
      summary: Delete user and revoke trust identity
      description: Deletes a user and revokes delegated trust identity artifacts.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: User deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
              example:
                data:
                  ok: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK

  /api/v1/schedules:
    get:
      tags: [ Schedules ]
      operationId: scheduleList
      summary: List schedules
      description: Returns paginated schedule definitions configured in Helling.
      parameters:
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageCursor'
      responses:
        '200':
          description: Schedule list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeScheduleList'
              example:
                data:
                  - id: 01JZABC0123456789ABCDEFGJK
                    type: backup
                    target: vm-web-1
                    cron: "0 3 * * *"
                    enabled: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
                  page:
                    has_next: false
                    next_cursor: null
                    limit: 50
    post:
      tags: [ Schedules ]
      operationId: scheduleCreate
      summary: Create schedule
      description: Creates a recurring schedule for backup or snapshot workloads.
      requestBody:
        required: true
        description: Schedule creation payload with type, target, and cron expression.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
            example:
              type: backup
              target: vm-web-1
              cron: "0 3 * * *"
      responses:
        '201':
          description: Schedule created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSchedule'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  type: backup
                  target: vm-web-1
                  cron: "0 3 * * *"
                  enabled: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
  /api/v1/schedules/{id}:
    get:
      tags: [ Schedules ]
      operationId: scheduleGet
      summary: Get schedule detail
      description: Returns schedule details for a specific schedule ULID.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Schedule details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSchedule'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  type: backup
                  target: vm-web-1
                  cron: "0 3 * * *"
                  enabled: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
    put:
      tags: [ Schedules ]
      operationId: scheduleUpdate
      summary: Update schedule
      description: Updates mutable schedule fields while preserving unspecified values.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        description: Partial schedule update payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScheduleRequest'
            example:
              cron: "0 */6 * * *"
              enabled: true
      responses:
        '200':
          description: Schedule updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSchedule'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  type: backup
                  target: vm-web-1
                  cron: "0 */6 * * *"
                  enabled: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
    delete:
      tags: [ Schedules ]
      operationId: scheduleDelete
      summary: Delete schedule
      description: Deletes an existing schedule definition.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Schedule deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
              example:
                data:
                  ok: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
  /api/v1/schedules/{id}/run:
    post:
      tags: [ Schedules ]
      operationId: scheduleRunNow
      summary: Run schedule now
      description: Triggers immediate execution of the referenced schedule.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '202':
          description: Schedule execution trigger accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
              example:
                data:
                  ok: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK

  /api/v1/webhooks:
    get:
      tags: [ Webhooks ]
      operationId: webhookList
      summary: List webhooks
      description: Returns configured webhook integrations.
      parameters:
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageCursor'
      responses:
        '200':
          description: Webhook list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeWebhookList'
              example:
                data:
                  - id: 01JZABC0123456789ABCDEFGJK
                    name: ops-pagerduty
                    url: https://events.example.com/helling
                    events: [ instance.created, instance.deleted ]
                    enabled: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
                  page:
                    has_next: false
                    next_cursor: null
                    limit: 50
    post:
      tags: [ Webhooks ]
      operationId: webhookCreate
      summary: Create webhook
      description: Creates an outbound event-delivery webhook endpoint.
      requestBody:
        required: true
        description: Webhook configuration including destination URL and event subscriptions.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
            example:
              name: ops-pagerduty
              url: https://events.example.com/helling
              events: [ instance.created, instance.deleted ]
      responses:
        '201':
          description: Webhook created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeWebhook'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  name: ops-pagerduty
                  url: https://events.example.com/helling
                  events: [ instance.created, instance.deleted ]
                  enabled: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
  /api/v1/webhooks/{id}:
    get:
      tags: [ Webhooks ]
      operationId: webhookGet
      summary: Get webhook
      description: Returns details for a specific webhook by ULID.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Webhook details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeWebhook'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  name: ops-pagerduty
                  url: https://events.example.com/helling
                  events: [ instance.created, instance.deleted ]
                  enabled: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
    put:
      tags: [ Webhooks ]
      operationId: webhookUpdate
      summary: Update webhook
      description: Updates mutable webhook settings for an existing webhook.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        description: Partial webhook update payload.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
            example:
              name: ops-discord
              enabled: true
      responses:
        '200':
          description: Webhook updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeWebhook'
              example:
                data:
                  id: 01JZABC0123456789ABCDEFGJK
                  name: ops-discord
                  url: https://events.example.com/helling
                  events: [ instance.created ]
                  enabled: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
    delete:
      tags: [ Webhooks ]
      operationId: webhookDelete
      summary: Delete webhook
      description: Deletes a webhook configuration.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Webhook deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
              example:
                data:
                  ok: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
  /api/v1/webhooks/{id}/test:
    post:
      tags: [ Webhooks ]
      operationId: webhookTest
      summary: Send test delivery
      description: Sends a test event delivery to verify webhook reachability and signing.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '202':
          description: Test webhook delivery accepted for asynchronous processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
              example:
                data:
                  ok: true
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK

  /api/v1/kubernetes:
    get:
      tags: [ Kubernetes ]
      operationId: kubernetesList
      summary: List clusters
      description: Returns Kubernetes clusters managed by Helling.
      parameters:
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/PageCursor'
      responses:
        '200':
          description: Cluster list returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeKubernetesClusterList'
              example:
                data:
                  - name: k3s-prod
                    state: ready
                    k8s_version: v1.30.0+k3s1
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
                  page:
                    has_next: false
                    next_cursor: null
                    limit: 50
    post:
      tags: [ Kubernetes ]
      operationId: kubernetesCreate
      summary: Create cluster
      description: Starts asynchronous provisioning of a new Kubernetes cluster.
      requestBody:
        required: true
        description: Cluster creation payload with cluster name and Kubernetes version.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKubernetesClusterRequest'
            example:
              name: k3s-prod
              k8s_version: v1.30.0+k3s1
      responses:
        '202':
          description: Cluster provisioning request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeKubernetesCluster'
              example:
                data:
                  name: k3s-prod
                  state: provisioning
                  k8s_version: v1.30.0+k3s1
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
  /api/v1/kubernetes/{name}:
    get:
      tags: [ Kubernetes ]
      operationId: kubernetesGet
      summary: Get cluster detail
      description: Returns details for a named Kubernetes cluster.
      parameters:
        - $ref: '#/components/parameters/NamePath'
      responses:
        '200':
          description: Cluster details returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeKubernetesCluster'
              example:
                data:
                  name: k3s-prod
                  state: ready
                  k8s_version: v1.30.0+k3s1
                meta:
                  request_id: req_01JZABC0123456789ABCDEFGJK
    delete:
      tags: [ Kubernetes ]
      operationId: kubernetesDelete
      summary: Delete cluster
      description: Starts asynchronous cluster deletion workflow.
      parameters:
        - $ref: '#/components/parameters/NamePath'
      responses:
        '202':
          description: Cluster deletion request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSimpleOk'
              example:
                data:
                  ok: true
                meta:
