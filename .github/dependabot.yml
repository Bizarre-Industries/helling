#
# Dependabot configuration for Helling.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# ─────────────────────────────────────────────────────────────────────────────
# ACTIVATION STATE
# ─────────────────────────────────────────────────────────────────────────────
#   Active:   github-actions (workflows exist today)
#   Inactive: gomod, npm, docker — templates commented below.
#             Uncomment the relevant block when:
#             - gomod:  apps/hellingd (or any go.mod) lands
#             - npm:    web/package.json lands
#             - docker: Dockerfiles land (deploy/ or elsewhere)
#
# ─────────────────────────────────────────────────────────────────────────────
# CONVENTIONS
# ─────────────────────────────────────────────────────────────────────────────
# - All schedules fire weekly on Monday 05:00 Asia/Dubai (Suhail's tz).
#   Batched runs minimize context-switching vs spreading across the week.
# - Major version bumps are IGNORED globally. Majors need human review;
#   auto-bumping v4 → v5 of actions/checkout regularly breaks assumptions.
#   Dependabot insights tab will still surface them — you just won't get a PR.
# - Grouping keeps PR count manageable. Default expectation: 3-5 PRs/week once
#   Go and npm are active, not 30.
# - Commit messages use conventional commits (lefthook commit-msg enforces
#   the same pattern — see docs/spec/pre-commit.md).

version: 2

updates:

  # ══════════════════════════════════════════════════════════════════════════
  # GitHub Actions — ACTIVE
  # ══════════════════════════════════════════════════════════════════════════
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Asia/Dubai
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    groups:
      # actions/* and github/* are tightly coupled (setup-go, checkout,
      # codeql-action all move together). Grouping cuts CI noise.
      github-official:
        patterns:
          - "actions/*"
          - "github/*"
      # Security scanners — anchore (grype/syft), gitleaks, OpenSSF Scorecard,
      # crate-ci/typos. Security updates are rarer; batching is safe.
      security-scanners:
        patterns:
          - "anchore/*"
          - "gitleaks/*"
          - "ossf/*"
          - "crate-ci/*"
      # Linter and build-adjacent actions — less frequent, group together.
      linters-and-build:
        patterns:
          - "golangci/*"
          - "DavidAnson/*"
          - "lycheeverse/*"
          - "oven-sh/*"
    ignore:
      # Major version bumps need human review. They usually require
      # input/output contract changes that auto-bumps don't handle.
      - dependency-name: "*"
        update-types: [ "version-update:semver-major" ]

  # ══════════════════════════════════════════════════════════════════════════
  # Go modules — INACTIVE (uncomment when apps/ go.mod files land)
  # ══════════════════════════════════════════════════════════════════════════
