  # ══════════════════════════════════════════════════════════════════════════
  # Docker — INACTIVE (ADR-004: Helling ships as .deb, not containers)
  # ══════════════════════════════════════════════════════════════════════════
  # Activate only if Dockerfiles land for dev/test environments
  # (e.g., a CI builder image or Lima bootstrap container).
  # Production is bare-metal .deb per ADR-004 and infrastructure.md.
