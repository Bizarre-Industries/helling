  # If you switch to a single go.mod at root, reduce `directories:` to [/].
  #
  # - package-ecosystem: gomod
  #   directories:
  #     - /                        # root go.mod (if using single-module layout)
  #     - /apps/hellingd
  #     - /apps/helling-cli
  #     - /apps/helling-proxy
  #     - /apps/helling-agent
