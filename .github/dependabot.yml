version: 2
# Dependabot config for Helling. Updated 2026-04-21.
# gomod/npm/docker ecosystems remain commented until code lands; enabling them
# before go.mod/package.json/Dockerfile exist produces noisy open PRs.

updates:
  # -------------------------------------------------------------------------
  # GitHub Actions (pinned SHAs per ADR-026)
  # -------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-official:
        patterns:
          - "actions/*"
          - "github/*"
      security-scanners:
        patterns:
          - "anchore/*"
          - "ossf/*"
          - "aquasecurity/*"
          - "trufflesecurity/*"
      linters-and-build:
        patterns:
          - "golangci/*"
          - "crate-ci/*"
          - "goreleaser/*"
  # -------------------------------------------------------------------------
  # gomod
  # -------------------------------------------------------------------------
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps(go)"
      include: "scope"
    groups:
      huma-and-web:
        patterns:
          - "github.com/danielgtaylor/huma/*"
          - "github.com/go-chi/chi/*"
      db-and-migrations:
        patterns:
          - "github.com/jackc/pgx/*"
          - "github.com/pressly/goose/*"
          - "github.com/kyleconroy/sqlc/*"
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"
      testing:
        patterns:
          - "github.com/stretchr/testify"
          - "github.com/bradleyjkemp/cupaloy/*"
