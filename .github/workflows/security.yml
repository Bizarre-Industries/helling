# SPDX-License-Identifier: AGPL-3.0-or-later
name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_call:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image
        run: docker build -f deploy/Dockerfile -t helling-scan:${{ github.sha }} .

      - uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          image: helling-scan:${{ github.sha }}
          severity-cutoff: critical
          fail-build: false
          output-format: sarif

      - uses: github/codeql-action/upload-sarif@f35333b910470a5408cb081b68f0701254a7d27b # v3.28.18
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build image
        run: docker build -f deploy/Dockerfile -t helling-scan:${{ github.sha }} .

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: helling-scan:${{ github.sha }}
          format: cyclonedx-json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: "*.cyclonedx.json"

  codeql:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, javascript-typescript]
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: matrix.language == 'go'
        with:
          go-version: "1.26"

      - name: Install system dependencies
        if: matrix.language == 'go'
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: Install oapi-codegen and generate Go types
        if: matrix.language == 'go'
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1
          export PATH="$(go env GOPATH)/bin:$PATH"
          make generate-go

      - uses: github/codeql-action/init@f35333b910470a5408cb081b68f0701254a7d27b # v3.28.18
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'go' && 'manual' || 'none' }}

      - name: Build Go
        if: matrix.language == 'go'
        run: go build -tags devauth ./apps/hellingd/...

      - uses: github/codeql-action/analyze@f35333b910470a5408cb081b68f0701254a7d27b # v3.28.18

  osv:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Install osv-scanner
        run: go install github.com/google/osv-scanner/cmd/osv-scanner@latest

      - name: Run OSV scanner
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          osv-scanner scan --lockfile apps/hellingd/go.sum || true
