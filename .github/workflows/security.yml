name: Security
# Weekly Grype scan + OpenSSF Scorecard.
# Action pins resolved 2026-04-21 per ADR-026.
on:
  push:
    branches: [ main, "release/**" ]
  schedule:
    - cron: "0 4 * * 1" # Monday 04:00 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: false

jobs:
  grype:
    name: Grype — artifact + SBOM vulnerability scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: github.event_name != 'schedule' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write
    env:
      # Bumped 2026-04-21: old anchore/scan-action v4.1.2 bundled Grype v0.80.0,
      # which can't load the current v6 DB schema. Installing Grype + Syft
      # explicitly to control versions and avoid wrapper lag.
      SYFT_VERSION: "1.42.4" # https://github.com/anchore/syft/releases
      GRYPE_VERSION: "0.110.0" # https://github.com/anchore/grype/releases
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: true

      - name: Check prerequisites
        id: prereq
        run: |
          if [ ! -f go.mod ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No go.mod yet — skipping artifact build and vulnerability scan."
          fi

      - name: Add local bin to PATH
        if: steps.prereq.outputs.skip != 'true'
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Syft binary
        if: steps.prereq.outputs.skip != 'true'
        id: syft-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/syft
          key: ${{ runner.os }}-syft-${{ env.SYFT_VERSION }}

      - name: Build artifacts
        if: steps.prereq.outputs.skip != 'true'
        run: |
          mkdir -p dist
          for cmd in apps/hellingd apps/helling-cli apps/helling-proxy apps/helling-agent; do
            if [ -d "$cmd" ]; then
              name=$(basename "$cmd")
              go build -trimpath -ldflags='-s -w' -o "dist/$name" "./$cmd"
            fi
          done

      - name: Install Syft
        if: steps.prereq.outputs.skip != 'true' && steps.syft-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | \
            sh -s -- -b "$HOME/.local/bin" "v${SYFT_VERSION}"

      - name: Syft version
        if: steps.prereq.outputs.skip != 'true'
        run: syft version

      - name: Generate SBOM (CycloneDX JSON)
        if: steps.prereq.outputs.skip != 'true'
        run: syft dir:./dist -o cyclonedx-json > dist/sbom.cdx.json

      - name: Cache Grype binary
        if: steps.prereq.outputs.skip != 'true'
        id: grype-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.local/bin/grype
          key: ${{ runner.os }}-grype-${{ env.GRYPE_VERSION }}

      - name: Install Grype
        if: steps.prereq.outputs.skip != 'true' && steps.grype-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | \
            sh -s -- -b "$HOME/.local/bin" "v${GRYPE_VERSION}"

      - name: Grype version
        if: steps.prereq.outputs.skip != 'true'
        run: grype version

      - name: Refresh vulnerability DB
        if: steps.prereq.outputs.skip != 'true'
        run: grype db update

      - name: Scan SBOM with Grype (SARIF)
        if: steps.prereq.outputs.skip != 'true'
        run: grype -o sarif --fail-on high "sbom:dist/sbom.cdx.json" > grype.sarif

      - name: Upload SARIF
        # Upload even on scan failure so findings appear in the Code Scanning tab.
        if: steps.prereq.outputs.skip != 'true' && always() && hashFiles('grype.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: grype.sarif
          category: grype

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # publish_results=true requires a push to the default branch.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # ossf/scorecard-action has no floating v2 tag; pin to a specific v2.x.x.
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # The Scorecard score-gate previously in this workflow was removed 2026-04-21:
      #   jq -r '.runs[0].properties.score // 0' results.sarif  →  always 0
      # Scorecard's SARIF output does NOT put an aggregate score at
      # runs[0].properties.score — it emits per-check security-severity
      # properties, no single aggregate field at that path. The gate silently
      # rubber-stamped every run. Scorecard is designed as an informational
      # signal surfaced through Code Scanning, not as a pre-merge gate. If a
      # score floor is genuinely wanted later, it requires a second Scorecard
      # invocation with `results_format: json` and parsing `.score` from JSON —
      # deliberately not doing that here because the floor would be arbitrary.
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: results.sarif
          category: ossf-scorecard
