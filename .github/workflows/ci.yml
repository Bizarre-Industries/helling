# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
  pull_request:
  workflow_call:


permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libpam0g-dev
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1

      - name: Install web dependencies
        run: cd web && bun install

      - name: Generate API types
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make generate

      - name: Verify generated files are clean
        run: git diff --exit-code apps/hellingd/api/*.gen.go apps/helling-cli/internal/client/*.gen.go || true

      - name: Build
        run: make build TAGS=devauth

      - name: Build frontend
        run: cd web && bun run build

      - name: Test
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: Install tools
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1

      - name: Generate Go API types
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make generate-go

      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897e3d9ea963f3843f7 # v8.0.0
        with:
          version: v2.1.6
          working-directory: apps/hellingd
          args: --timeout 5m -c ../../.golangci.yml

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install formatters
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest
      - name: Check Go formatting
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          DIFF=$(gofumpt -d apps/)
          if [ -n "$DIFF" ]; then
            echo "::error::Go files not formatted. Run 'make fmt'"
            echo "$DIFF"
            exit 1
          fi
      - name: Check frontend formatting
        run: |
          cd web && bun install
          bunx prettier --check "src/**/*.{ts,tsx,js,jsx,css,html}"

  security-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Install tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/zricethezav/gitleaks/v8@v8.28.0
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1

      - name: Generate Go API types
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make generate-go

      - name: Run govulncheck
        working-directory: apps/hellingd
        continue-on-error: true
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          govulncheck -tags devauth ./... || echo "::warning::govulncheck found vulnerabilities in transitive dependencies"

      - name: Run gitleaks
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          gitleaks detect --source . --no-banner

  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Install vacuum
        run: go install github.com/daveshanley/vacuum@latest

      - name: Lint OpenAPI spec
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          vacuum lint --details --no-banner api/openapi.yaml

  nilaway:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: Install tools
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.5.1
          go install go.uber.org/nilaway/cmd/nilaway@latest

      - name: Generate Go API types
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make generate-go

      - name: Run nilaway
        working-directory: apps/hellingd
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          nilaway -include-pkgs "github.com/Bizarre-Industries/helling" ./...

  web-test:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: cd web && bun install

      - name: Run Vitest
        run: cd web && bun run test
